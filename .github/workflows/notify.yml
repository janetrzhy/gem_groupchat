name: Scheduled Chat Bot

on:
  schedule:
    # UTC 0:00–13:00 covers daytime hours in Melbourne (UTC+10/+11)
    # Runs at minute 24 of every hour in this window
    - cron: '24 0-13 * * *'
  workflow_dispatch:

jobs:
  run_bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL_NAME: ${{ secrets.LLM_MODEL_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CUSTOM_PROMPT: ${{ secrets.CUSTOM_PROMPT }}
          FALLBACK_MSG: ${{ secrets.FALLBACK_MSG }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: python bot.py

      - name: Auto-commit state changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update state.json"
          file_pattern: "state.json"
